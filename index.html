<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Library App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Library App</h1>
    </header>
    <main>
        <div id="library-grid">
            <div class="book-card add-button" id="add-book-btn">
                <span>+</span>
            </div> 
       
            <div class="search-panel" id="search-overlay">
                <input type="text" class="search-input" id="search-input">
                <div class="search-home">
                    <div class="home-btn" id="home-btn"><span>Home</span></div>     
                    <div class="home-btn" id="search-btn"><span>Search</span></div>  
                </div>
                <div class="search-results" id="search-results"></div>     
                </div>       
            </div>    
        </div>
        
        <div class="custom-overlay" id="custom-overlay">
            <button class="custom-btn" id="custom-btn" style="width: 10vw; background-color: #BFA28C;">Close</button>
            <button class="custom-btn">Custom Image</button>
            <h3>Author: </h3>
            <input type="text" placeholder="Enter Author">
            <h3>Book Name: </h3>
            <input type="text" placeholder="Enter Book Name">
        </div>
        
    </main>
    <footer>
    </footer>

    <script src="app.js"></script>
</body>
</html>
